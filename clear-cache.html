<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Cache</title>
<style>
body{background:#0a0f1e;color:#e2e8f0;font-family:'Sarabun',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;margin:0;padding:20px;text-align:center;}
h2{color:#d4af37;margin-bottom:8px}
p{color:#94a3b8;font-size:14px;line-height:1.7;margin-bottom:20px}
button{background:linear-gradient(135deg,#d4af37,#8a6200);border:none;
  border-radius:10px;color:#000;font-size:15px;font-weight:700;
  padding:14px 28px;cursor:pointer;font-family:inherit;}
#status{margin-top:16px;font-size:13px;color:#5dba8a;min-height:20px}
</style>
</head>
<body>
<div style="font-size:40px;margin-bottom:12px">🔄</div>
<h2>ล้าง Cache เก่า</h2>
<p>กดปุ่มด้านล่างเพื่อล้าง Service Worker และ cache เก่าทั้งหมด<br>
แล้วกลับไปติดตั้งแอปใหม่</p>
<button onclick="clearAll()">🗑️ ล้าง Cache และ SW ทั้งหมด</button>
<div id="status"></div>
<script>
async function clearAll() {
  const st = document.getElementById('status');
  st.textContent = '⏳ กำลังล้าง...';
  try {
    // Unregister all service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    // Clear all caches
    if (window.caches) {
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
    }
    // Clear localStorage pwa flags
    localStorage.removeItem('pwa-dismissed');
    sessionStorage.removeItem('pwa-dismissed');
    st.textContent = '✅ ล้างเสร็จแล้ว! กลับไปเปิดแอปใหม่และรอ 5 วินาที';
    setTimeout(() => { window.location.href = './index.html'; }, 2000);
  } catch(e) {
    st.style.color = '#ef8080';
    st.textContent = '⚠️ Error: ' + e.message;
  }
}
</script>
</body>
</html>
